name: CI

# No `permissions:` block — Forgejo doesn't scope FORGEJO_TOKEN/GITHUB_TOKEN
# via this field (GitHub-compat syntax only, a no-op here).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: debian-trixie
    container:
      image: python:3.13-bookworm

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libudev-dev bluez git curl ca-certificates gnupg
          # act_runner executes JS-based actions (actions/checkout, etc.) by
          # running `node` inside this job container. python:3.13-bookworm
          # doesn't ship one, so install it explicitly — same NodeSource
          # approach as the homelab act-runner image.
          curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
          apt-get install -y --no-install-recommends nodejs

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Python dependencies
        id: venv_cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .venv
          key: test-venv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            test-venv-

      - name: Install Python Dependencies
        if: steps.venv_cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip setuptools wheel
          .venv/bin/pip install -e .[test] --config-settings editable_mode=compat

      - name: Add venv to PATH
        run: echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"

      - name: Run Tests
        run: |
          pytest tests/

      - name: Check formatting (black)
        run: |
          black --check --target-version py313 custom_components/ tests/

      - name: Check import order (isort)
        run: |
          isort --check-only custom_components/ tests/

      - name: Lint (flake8)
        run: |
          flake8 custom_components/ tests/

      - name: Lint (pylint)
        run: |
          pylint custom_components/ tests/ --fail-under=9.5
