name: Release

# No `permissions:` block — see .forgejo/workflows/ci.yml.
#
# Requires this repo's Actions "Workflow permissions" to be set to
# "Read and write" (repo Settings > Actions > General) so the default
# token can push the version-bump commit and tag back to main, and
# create the Forgejo release via the local API.
# GH_RELEASE_TOKEN is only used for the two GitHub API calls (poll +
# create release) — it never touches Forgejo.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.3, no v prefix)'
        required: true
        type: string

jobs:
  validate:
    name: Validate version input
    runs-on: debian-trixie
    steps:
      - name: Check version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not in X.Y.Z format"
            exit 1
          fi

  test:
    name: Test
    needs: validate
    runs-on: debian-trixie
    container:
      image: python:3.14-bookworm

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libudev-dev bluez git curl ca-certificates gnupg
          # act_runner executes JS-based actions (actions/checkout, etc.) by
          # running `node` inside this job container. python:3.13-bookworm
          # doesn't ship one, so install it explicitly — same NodeSource
          # approach as the homelab act-runner image.
          curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
          apt-get install -y --no-install-recommends nodejs

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        run: pip install uv

      - name: Cache uv downloads
        id: uv_cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/uv
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-

      # --locked fails the build if uv.lock is out of sync with pyproject.toml
      # instead of silently regenerating it.
      - name: Sync dependencies
        run: uv sync --extra test --locked

      - name: Add venv to PATH
        run: echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"

      - name: Run Tests
        run: |
          pytest tests/

      - name: Check formatting (black)
        run: |
          black --check --target-version py313 custom_components/ tests/

      - name: Check import order (isort)
        run: |
          isort --check-only custom_components/ tests/

      - name: Lint (flake8)
        run: |
          flake8 custom_components/ tests/

      - name: Lint (pylint)
        run: |
          pylint custom_components/ tests/ --fail-under=9.5

  release:
    name: Release
    needs: test
    runs-on: debian-trixie
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Bump version in manifest.json, pyproject.toml, README.md
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" custom_components/sensorpush_local/manifest.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/version-[0-9]*\.[0-9]*\.[0-9]*-blue/version-$VERSION-blue/" README.md

      # uv.lock embeds the project's own resolved version (a self-referencing
      # [[package]] entry) — it must be refreshed here or `uv sync --locked`
      # in ci.yml/release.yml's test job will fail on the next run after a
      # release, since it'd be out of sync with the version just bumped above.
      # This job runs directly on the runner (no `container:`), so it can't
      # assume pip is present the way the containerized test job can — the
      # standalone installer doesn't need one.
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Refresh uv.lock for the new version
        run: uv lock

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "forgejo-actions"
          git config user.email "actions@git.berry.house"
          git add custom_components/sensorpush_local/manifest.json pyproject.toml README.md uv.lock
          git commit -m "Release v$VERSION"
          git push origin HEAD:main

      - name: Tag release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "v$VERSION^" 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG..v$VERSION")
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "v$VERSION")
          fi
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Forgejo release
        env:
          VERSION: ${{ inputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          FORGEJO_TOKEN: ${{ github.token }}
          FORGEJO_RELEASES_URL: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases
        run: |
          jq -n \
            --arg tag "v$VERSION" \
            --arg name "v$VERSION" \
            --arg body "$CHANGELOG" \
            '{tag_name: $tag, name: $name, body: $body}' > /tmp/forgejo_release_payload.json

          http_status=$(curl -s -o /tmp/forgejo_release_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            "$FORGEJO_RELEASES_URL" \
            -d @/tmp/forgejo_release_payload.json)

          if [ "$http_status" != "201" ]; then
            echo "::error::Forgejo release creation failed with status $http_status"
            cat /tmp/forgejo_release_response.json
            exit 1
          fi

          echo "Forgejo release created: $(jq -r '.html_url' /tmp/forgejo_release_response.json)"

      - name: Wait for push mirror to sync tag to GitHub
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/kyleberry/sensorpush_local/git/ref/tags/v$VERSION")
            if [ "$status" = "200" ]; then
              echo "Tag v$VERSION found on GitHub"
              exit 0
            fi
            echo "Tag not on GitHub yet (attempt $i/12), waiting 5s..."
            sleep 5
          done
          echo "::error::Tag v$VERSION never appeared on GitHub after 60s — check the push mirror config in repo settings"
          exit 1

      - name: Create GitHub release
        env:
          VERSION: ${{ inputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          jq -n \
            --arg tag "v$VERSION" \
            --arg name "v$VERSION" \
            --arg body "$CHANGELOG" \
            '{tag_name: $tag, name: $name, body: $body}' > /tmp/release_payload.json

          http_status=$(curl -s -o /tmp/release_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/kyleberry/sensorpush_local/releases" \
            -d @/tmp/release_payload.json)

          if [ "$http_status" != "201" ]; then
            echo "::error::GitHub release creation failed with status $http_status"
            cat /tmp/release_response.json
            exit 1
          fi

          echo "Release created: $(jq -r '.html_url' /tmp/release_response.json)"
